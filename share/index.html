<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Share Your Experience | Stop Being Alone</title>
<meta name="description" content="Tell us about your experience with loneliness. Your words will directly shape what we build.">
<meta name="robots" content="noindex">
<link rel="icon" href="/public/favicon.ico">
<link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
<meta name="theme-color" content="#4CAF9F">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#F5F0E9;--ink:#3A3A3A;--ink-light:#5A5A5A;--ink-muted:#9A9590;--accent:#4CAF9F;--serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif;--max-w:800px}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

.nav{position:sticky;top:0;z-index:100;background:rgba(250,248,244,0.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.04);padding:0 32px}
.nav-inner{max-width:var(--max-w);margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{font-family:var(--serif);font-size:20px;font-weight:400;letter-spacing:-0.02em}
.nav-back{font-size:14px;color:var(--ink-muted)}
.nav-back:hover{color:var(--ink)}

.share-hero{padding:64px 0 32px;text-align:center}
.share-hero h1{font-family:var(--serif);font-size:clamp(32px,4vw,44px);font-weight:400;line-height:1.15;letter-spacing:-0.02em;margin-bottom:12px}
.share-hero h1 em{font-style:italic;position:relative;display:inline-block}
.share-hero h1 em::after{content:'';position:absolute;bottom:4px;left:-3px;right:-3px;height:10px;background:var(--accent);opacity:.22;z-index:-1;border-radius:2px;transform:skewX(-3deg)}
.share-hero p{font-size:16px;color:var(--ink-light);font-weight:300;max-width:480px;margin:0 auto;line-height:1.7}

.tally-section{max-width:var(--max-w);margin:0 auto;padding:0 32px 80px}
.tally-section iframe{width:100%;border:none;min-height:500px}

.trust-row{display:flex;justify-content:center;gap:32px;padding:0 0 48px;flex-wrap:wrap}
.trust-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-muted);font-weight:300}
.trust-item svg{width:14px;height:14px;stroke:var(--ink-muted)}
.mobile-drawer{display:none;position:fixed;inset:0;z-index:999;}.mobile-drawer.open{display:flex;}.mobile-drawer-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.3);}.mobile-drawer-panel{position:absolute;top:0;right:0;width:280px;height:100%;background:#F5F0E9;padding:80px 32px 32px;display:flex;flex-direction:column;gap:28px;box-shadow:-8px 0 40px rgba(0,0,0,0.1);}.mobile-drawer-panel a{font-family:"Instrument Serif",Georgia,serif;font-size:22px;color:#3A3A3A;text-decoration:none;}.mobile-drawer-panel a:hover{color:#4CAF9F;}.mobile-drawer-close{position:absolute;top:20px;right:24px;font-size:28px;color:#3A3A3A;cursor:pointer;background:none;border:none;font-weight:300;}@media(min-width:901px){.mobile-drawer{display:none!important;}}</style>
<link rel="icon" href="/public/favicon.ico"><link rel="apple-touch-icon" href="/public/apple-touch-icon.png"><meta name="theme-color" content="#4CAF9F"></head>
<body>

<nav class="nav"><div class="nav-inner">
  <a href="/" class="nav-logo">Stop Being Alone</a>
  <a href="/" class="nav-back">← Back to home</a>
</div></nav><div id="mobileDrawer" class="mobile-drawer"><div class="mobile-drawer-overlay" onclick="document.getElementById('mobileDrawer').classList.remove('open')"></div><div class="mobile-drawer-panel"><button class="mobile-drawer-close" onclick="document.getElementById('mobileDrawer').classList.remove('open')">&times;</button><a href="/">Home</a><a href="/blog">Blog</a><a href="/share">Share your experience</a><a href="/privacy" style="font-size:14px;color:#9A9590;font-family:DM Sans,sans-serif">Privacy</a><a href="/terms" style="font-size:14px;color:#9A9590;font-family:DM Sans,sans-serif">Terms</a></div></div>

<main>
<section class="share-hero">
  <h1>Tell us about your <em>experience.</em></h1>
  <p>This takes less than a minute. Your answers will directly shape what we build. No judgment, no spam.</p>
</section>

<div class="trust-row">
  <div class="trust-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    Private & anonymous
  </div>
  <div class="trust-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    Never shared or sold
  </div>
  <div class="trust-item">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    Takes 30 seconds
  </div>
</div>

<section class="tally-section">
  <iframe data-tally-src="https://tally.so/embed/QKrDW8?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="500" title="Tell us about your experience"></iframe>
</section>
</main>

<script src="https://tally.so/widgets/embed.js"></script>

</body>
</html>
