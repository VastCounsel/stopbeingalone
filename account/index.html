<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account - Stop Being Alone</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/supabase-auth.css">
  <style>
    :root {
      --cream: #F5F0E9;
      --ink: #3A3A3A;
      --accent: #4CAF9F;
      --accent-light: #C2E0D8;
      --card-bg: #FFFFFF;
      --card-border: #E5DDD4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
    }

    /* MINIMAL NAV */
    .account-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid var(--card-border);
      background: var(--cream);
    }

    .account-nav-logo {
      font-family: 'Instrument Serif', serif;
      font-size: 20px;
      color: var(--ink);
      text-decoration: none;
    }

    .account-nav-actions {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .account-nav-link {
      font-size: 14px;
      color: var(--ink);
      text-decoration: none;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .account-nav-link:hover {
      opacity: 1;
    }

    .account-logout-btn {
      font-size: 14px;
      color: var(--accent);
      background: none;
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 8px 18px;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      transition: background 0.2s, color 0.2s;
    }

    .account-logout-btn:hover {
      background: var(--accent);
      color: #FFFFFF;
    }

    /* CONTENT */
    .account-container {
      max-width: 640px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .account-title {
      font-family: 'Instrument Serif', serif;
      font-size: 36px;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .account-subtitle {
      font-size: 16px;
      opacity: 0.6;
      margin-bottom: 40px;
    }

    /* CARDS */
    .account-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 32px;
      margin-bottom: 20px;
    }

    .account-card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 20px;
    }

    .account-field {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #F0EBE3;
    }

    .account-field:last-child {
      border-bottom: none;
    }

    .account-field-label {
      font-size: 14px;
      opacity: 0.5;
    }

    .account-field-value {
      font-size: 15px;
      font-weight: 500;
    }

    /* SUBSCRIPTION CTA */
    .account-sub-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 32px;
      text-align: center;
    }

    .account-sub-title {
      font-family: 'Instrument Serif', serif;
      font-size: 22px;
      margin-bottom: 8px;
    }

    .account-sub-text {
      font-size: 15px;
      opacity: 0.6;
      margin-bottom: 24px;
    }

    .account-sub-btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--accent);
      color: #FFFFFF;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .account-sub-btn:hover {
      background: #3d9488;
    }

    /* DANGER ZONE */
    .account-danger {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--card-border);
    }

    .account-danger-btn {
      font-size: 14px;
      color: #C0392B;
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .account-danger-btn:hover {
      opacity: 1;
    }

    /* LOADING STATE */
    .account-loading {
      text-align: center;
      padding: 120px 24px;
      font-size: 16px;
      opacity: 0.5;
    }

    @media (max-width: 520px) {
      .account-nav { padding: 16px 20px; }
      .account-container { padding: 40px 20px 60px; }
      .account-title { font-size: 28px; }
      .account-card { padding: 24px; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="account-nav">
    <a href="/" class="account-nav-logo">Stop Being Alone</a>
    <div class="account-nav-actions">
      <a href="/" class="account-nav-link">Home</a>
      <button class="account-logout-btn" onclick="signOut()">Log out</button>
    </div>
  </nav>

  <!-- LOADING -->
  <div id="account-loading" class="account-loading">Loading your account...</div>

  <!-- CONTENT (hidden until loaded) -->
  <div id="account-content" class="account-container" style="display:none;">
    
    <h1 class="account-title" id="account-greeting">Your account</h1>
    <p class="account-subtitle" id="account-email-display"></p>

    <!-- PROFILE -->
    <div class="account-card">
      <h2 class="account-card-title">Profile</h2>
      <div class="account-field">
        <span class="account-field-label">Email</span>
        <span class="account-field-value" id="profile-email">--</span>
      </div>
      <div class="account-field">
        <span class="account-field-label">Name</span>
        <span class="account-field-value" id="profile-name">--</span>
      </div>
      <div class="account-field">
        <span class="account-field-label">Provider</span>
        <span class="account-field-value" id="profile-provider">--</span>
      </div>
      <div class="account-field">
        <span class="account-field-label">Member since</span>
        <span class="account-field-value" id="profile-since">--</span>
      </div>
    </div>

    <!-- SUBSCRIPTION -->
    <div class="account-sub-card">
      <h2 class="account-sub-title">Your plan</h2>
      <p class="account-sub-text">You don't have an active subscription yet. Start your free trial to access all features.</p>
      <a href="/#pricing" class="account-sub-btn">View plans</a>
    </div>

    <!-- DANGER ZONE -->
    <div class="account-danger">
      <button class="account-danger-btn" onclick="handleDeleteAccount()">Delete my account</button>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase-auth.js"></script>
  <script>
    async function loadAccount() {
      const { data: { session } } = await supabase.auth.getSession();
      
      if (!session) {
        window.location.href = '/?login=true';
        return;
      }

      const user = session.user;
      const loading = document.getElementById('account-loading');
      const content = document.getElementById('account-content');

      // Populate fields
      const name = user.user_metadata?.full_name || user.user_metadata?.name || '--';
      const email = user.email || '--';
      const provider = user.app_metadata?.provider || 'email';
      const since = new Date(user.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      document.getElementById('account-greeting').textContent = name !== '--' ? `Welcome, ${name.split(' ')[0]}.` : 'Your account';
      document.getElementById('account-email-display').textContent = email;
      document.getElementById('profile-email').textContent = email;
      document.getElementById('profile-name').textContent = name;
      document.getElementById('profile-provider').textContent = provider.charAt(0).toUpperCase() + provider.slice(1);
      document.getElementById('profile-since').textContent = since;

      loading.style.display = 'none';
      content.style.display = 'block';
    }

    async function handleDeleteAccount() {
      if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
        if (confirm('This will permanently delete your account and all associated data. Continue?')) {
          await signOut();
        }
      }
    }

    document.addEventListener('DOMContentLoaded', loadAccount);
  </script>

</body>
</html>
