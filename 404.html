<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 | Stop Being Alone</title>
<link rel="icon" href="/public/favicon.ico">
<link rel="apple-touch-icon" href="/public/apple-touch-icon.png">
<meta name="theme-color" content="#4CAF9F">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#F5F0E9;--ink:#3A3A3A;--ink-light:#5A5A5A;--ink-muted:#9A9590;--accent:#4CAF9F;--serif:'Instrument Serif',Georgia,serif;--sans:'DM Sans',-apple-system,sans-serif}
body{font-family:var(--sans);background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;-webkit-font-smoothing:antialiased}
.four{font-family:var(--serif);font-size:clamp(120px,20vw,200px);line-height:1;color:var(--accent);opacity:0.15;letter-spacing:-0.05em;margin-bottom:-20px}
h1{font-family:var(--serif);font-size:clamp(28px,4vw,40px);font-weight:400;line-height:1.2;letter-spacing:-0.02em;margin-bottom:16px}
h1 em{font-style:italic}
p{font-size:16px;color:var(--ink-light);font-weight:300;line-height:1.6;max-width:420px;margin-bottom:32px}
.links{display:flex;gap:16px;flex-wrap:wrap;justify-content:center}
.links a{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;border-radius:100px;font-size:14px;font-weight:500;transition:all 0.3s ease;text-decoration:none}
.links a.primary{background:var(--ink);color:var(--cream)}
.links a.primary:hover{background:#2A2A26;box-shadow:0 4px 16px rgba(0,0,0,0.15);transform:translateY(-2px)}
.links a.secondary{background:transparent;border:1px solid var(--ink);color:var(--ink)}
.links a.secondary:hover{background:var(--ink);color:var(--cream);transform:translateY(-2px)}
.links a span{transition:transform 0.3s}
.links a:hover span{transform:translateX(3px)}
</style>
</head>
<body>
<div class="four">404</div>
<h1>This page wandered off.</h1>
<p>Even pages get lost sometimes. The good news? You're exactly where you need to be. Let's get you back on track.</p>
<div class="links">
  <a href="/" class="primary">Go home <span>→</span></a>
  <a href="/blog" class="secondary">Read the blog <span>→</span></a>
</div>
</body>
</html>
